<body>
  <!-- Header -->
  <header>
  
  <h1>Timeless Blooms 🌸</h1>

    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="Product.html">Product</a>

      <a href="index.html" class="logout">Logout</a>
    </nav>
  </header>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="container">
      <h2>Contact Us</h2>
      
      <!-- Contact Form -->
      <form action="#" method="post" aria-label="Contact Form">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />
        
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
        
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
        
        <button type="submit">Send Message</button>
      </form>

      <!-- Store Information -->
      <div class="info">
        <h3>Store Information</h3>
        <p><strong>Address:</strong> St. Pingol, Matina, Davao City</p>
        <p><strong>Phone:</strong> (123) 456-7890</p>
        <p><strong>Email:</strong> timelessblossom@gmail.com</p>
      </div>

      <!-- Map Section -->
      <div class="map">
        <h3>Our Location</h3>
        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3931.4054861242377!2d125.5940857!3d7.0531687!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x32f9729abf906e7d%3A0x5bfcfd8601195fb6!2sSt.%20John%20Paul%20II%20College%20of%20Davao!5e0!3m2!1sen!2sph!4v1715163382671!5m2!1sen!2sph" 
        width="50%" 
        height="400" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade"
        title="Timeless Blooms Location">
      </iframe>
      
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="text-align: center; background-color: rgb(225, 43, 179); padding: 20px; color: #fff; margin-top: 0px;">
    <p>&copy; 2025 Timeless Blooms. All rights reserved.</p>
  </footer>
</body>
</html>
